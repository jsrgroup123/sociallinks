<!DOCTYPE html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f7fa,#e4ecf7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:480px;
}

.card{
    background:#fff;
    border-radius:25px;
    padding:40px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
}

.logo img{
    width: 300px;px;
    height:150px;
    border: radius 5%;
    object-fit:cover;
    border:4px solid #f2f2f2;
}

h1{
    text-align:center;
    margin-top:15px;
    font-size:28px;
    color:#1b1b1b;
}

.tagline{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-top:8px;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link-btn{
    text-decoration:none;
    background:#fff;
    border:1px solid #e8e8e8;
    padding:18px 20px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#222;
    font-weight:500;
    transition:.3s;
}

.link-btn:hover{
    transform:translateY(-4px);
    background:#0f172a;
    color:#fff;
    box-shadow:0 15px 30px rgba(15,23,42,.18);
}

.icon{
    font-size:22px;
}

.arrow{
    font-size:18px;
}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:13px;
    color:#888;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
    padding:15px;
    background:#f8fafc;
    border-radius:15px;
}

.stat{
    text-align:center;
}

.stat h3{
    color:#0f172a;
    font-size:18px;
}

.stat p{
    font-size:12px;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
    <img src="logo.png.png" alt="JSR Group">

    </div>

    </div>
</div>
