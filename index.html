<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR Suncity Group | Connect With Us</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tinos:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f7fa,#e4ecf7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:480px;
}

.card{
    background:#fff;
    border-radius:25px;
    padding:40px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
}

.logo img{
    width: 300px;px;
    height:150px;
    border: radius 5%;
    object-fit:cover;
    border:4px solid #f2f2f2;
}

h1{
    text-align:center;
    margin-top:15px;
    font-size:28px;
    color:#1b1b1b;
}

.tagline{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-top:8px;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link-btn{
    text-decoration:none;
    background:#fff;
    border:1px solid #e8e8e8;
    padding:18px 20px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#222;
    font-weight:500;
    transition:.3s;
}

.link-btn:hover{
    transform:translateY(-4px);
    background:#0f172a;
    color:#fff;
    box-shadow:0 15px 30px rgba(15,23,42,.18);
}

.icon{
    font-size:22px;
}

.arrow{
    font-size:18px;
}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:13px;
    color:#888;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
    padding:15px;
    background:#f8fafc;
    border-radius:15px;
}

.stat{
    text-align:center;
}

.stat h3{
    color:#0f172a;
    font-size:18px;
}

.stat p{
    font-size:12px;
    color:#666;
}
.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.left i{
    font-size:28px;
    width:35px;
}

.website:hover{
    background:#111827;
}

.whatsapp:hover{
    background:#25D366;
}

.facebook:hover{
    background:#1877F2;
}

.instagram:hover{
    background:linear-gradient(
    45deg,
    #f58529,
    #dd2a7b,
    #8134af,
    #515bd4);
}

.youtube:hover{
    background:#ff0000;
}

.maps:hover{
    background:#34a853;
}

.call:hover{
    background:#0ea5e9;
}

.brochure:hover{
    background:#f97316;
}

.link-btn:hover{
    color:#fff;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.95);
}

.logo img{
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

body{
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #0ea5e9);
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
    <img src="logo.png.png" alt="JSR Group">
</div>
<!--
</h1>JSR Group Suncity</h1/>
-->
<p class="tagline">
20+ Years of Excellence in Real Estate
</p>

<div class="stats">
    <div class="stat">
        <h3>20+</h3>
        <p>Years</p>
    </div>

    <div class="stat">
        <h3>5000+</h3>
        <p>Customers</p>
    </div>

    <div class="stat">
        <h3>100%</h3>
        <p>Legal</p>
    </div>
</div>

<div class="links">

<a href="#" class="link-btn website" target="_blank">
<div class="left">
<i class="fas fa-globe"></i>
<span>Official Website</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn whatsapp" target="_blank">
<div class="left">
<i class="fab fa-whatsapp"></i>
<span>WhatsApp</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn facebook" target="_blank">
<div class="left">
<i class="fab fa-facebook-f"></i>
<span>Facebook</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn instagram" target="_blank">
<div class="left">
<i class="fab fa-instagram"></i>
<span>Instagram</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn youtube" target="_blank">
<div class="left">
<i class="fab fa-youtube"></i>
<span>YouTube</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn maps" target="_blank">
<div class="left">
<i class="fas fa-location-dot"></i>
<span>Google Maps</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="tel:+919999999999" class="link-btn call">
<div class="left">
<i class="fas fa-phone"></i>
<span>Call Us</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

<a href="#" class="link-btn brochure" target="_blank">
<div class="left">
<i class="fas fa-file-pdf"></i>
<span>Download Brochure</span>
</div>
<i class="fas fa-arrow-right"></i>
</a>

</div>

<div class="footer">
© 2026 JSR Group Suncity. All Rights Reserved.
</div>

</div>

</div>

</body>
</html>
